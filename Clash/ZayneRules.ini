;3、节点组
custom_proxy_group=手动选择`select`.*
custom_proxy_group=自动选择`url-test`.*`http://www.gstatic.com/generate_204`180,5,100
custom_proxy_group=香港自动`url-test`(港|HK|Hong Kong)`http://www.gstatic.com/generate_204`180,5,100
custom_proxy_group=台湾自动`url-test`(台|新北|彰化|TW|Taiwan)`http://www.gstatic.com/generate_204`180,5,100
custom_proxy_group=日本自动`url-test`(日本|川日|东京|大阪|泉日|埼玉|沪日|深日|[^-]日|JP|Japan)(?!利亚)`http://www.gstatic.com/generate_204`180,5,100
custom_proxy_group=狮城自动`url-test`(新加坡|坡|狮城|SG|Singapore)`http://www.gstatic.com/generate_204`180,5,100
custom_proxy_group=美国自动`url-test`(美|波特兰|达拉斯|俄勒冈|凤凰城|费利蒙|硅谷|拉斯维加斯|洛杉矶|圣何塞|圣克拉拉|西雅图|芝加哥|US|United States)`http://www.gstatic.com/generate_204`180,5,100

